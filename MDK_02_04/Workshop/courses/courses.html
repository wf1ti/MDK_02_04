<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск курсов</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="courses.css">
</head>
<body>

  <div class="page">

    <!-- Search bar -->
    <div class="search-bar">
      <input type="text" placeholder="Поиск по курсам">
      <button type="button">Искать</button>
    </div>

    <!-- Results header -->
    <div class="results-header">
      <span class="results-count">Найдено всего <strong>1419</strong> курсов</span>
      <label class="sort-label">
        <input type="checkbox"> Сначала новые
      </label>
    </div>

    <!-- Course card -->
    <div class="course-card">
      <div class="course-img">
        <img src="https://via.placeholder.com/200x140?text=Фото" alt="Курс">
      </div>
      <div class="course-info">
        <span class="course-type">Курс повышения квалификации</span>
        <h2 class="course-title">Функциональная грамотность школьников</h2>
        <div class="course-meta">
          <span class="course-hours">🕐 72/108/144 ч.</span>
          <div class="course-price">
            <span class="price-old">от 1900 руб.</span>
            <span class="price-new">💰 от 950 руб.</span>
          </div>
          <div class="course-actions">
            <button class="btn-apply">Подать заявку</button>
            <button class="btn-about">О курсе</button>
          </div>
        </div>
        <p class="course-students">Сейчас обучается <strong>1925 человек</strong> из <strong>82 регионов</strong></p>
      </div>
    </div>

  </div>

</body>
</html>
