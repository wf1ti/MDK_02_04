<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Znanium.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ВЕРХНЯЯ СТРОКА: логотип + регистрация -->
  <div class="topbar">
    <div class="topbar__brand">
      <span class="topbar__logo">znanium.com</span>
      <span class="topbar__sub">электронно-библиотечная система</span>
    </div>
    <div class="topbar__auth">
      <span class="topbar__new">Впервые на сайте?</span>
      <a href="#" class="topbar__link">&#128100; Регистрация</a>
      <span class="topbar__sep">/</span>
      <a href="#" class="topbar__link">Вход</a>
    </div>
  </div>

  <!-- НАВИГАЦИЯ -->
  <nav class="navbar">
    <ul class="navbar__list">
      <li class="navbar__item"><a href="#" class="navbar__link">КАТАЛОГ</a></li>
      <li class="navbar__item"><a href="#" class="navbar__link">КОЛЛЕКЦИИ</a></li>
      <li class="navbar__item"><a href="#" class="navbar__link">О ПРОЕКТЕ</a></li>
      <li class="navbar__item"><a href="#" class="navbar__link">ЦЕНЫ</a></li>
      <li class="navbar__item"><a href="#" class="navbar__link">СПРАВКА</a></li>
      <li class="navbar__item"><a href="#" class="navbar__link">ВЕБИНАРЫ</a></li>
    </ul>
    <div class="navbar__icons">
      <!-- иконка "просмотр" -->
      <a href="#" class="navbar__icon" title="Просмотр">&#128065;</a>
      <!-- иконка "корзина" -->
      <a href="#" class="navbar__icon" title="Корзина">&#128722;</a>
    </div>
  </nav>

</body>
</html>
