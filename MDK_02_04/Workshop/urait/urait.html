<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Юрайт — Образовательная платформа</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="urait.css">
</head>
<body>

  <header>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-inner">

        <!-- Logo -->
        <div class="logo-block">
          <img src="https://urait.ru/images/logo_206x56.svg" alt="Юрайт" class="logo-img">
        </div>

        <!-- Separator -->
        <div class="sep"></div>

        <!-- Stats -->
        <div class="stats">
          <span class="stats-date">21 ноября 2022</span>
          <div class="stats-items">
            <div class="stats-item">
              <span class="stats-num">43 630<sup>+18</sup></span>
              <span class="stats-label">активны на платформе</span>
            </div>
            <div class="stats-item">
              <span class="stats-num">400 990<sup>+308</sup></span>
              <span class="stats-label">Преподавателей</span>
            </div>
            <div class="stats-item">
              <span class="stats-num"></span>
              <span class="stats-label">Студентов</span>
            </div>
          </div>
        </div>

        <!-- Accessibility -->
        <div class="accessibility">
          <span class="access-icon">👓</span>
          <span class="access-text">Версия для слабовидящих</span>
        </div>

      </div>
    </div>

    <!-- Nav -->
    <nav>
      <div class="nav-inner">
        <ul>
          <li class="nav-grid"><a href="#">⊞ Каталог</a></li>
          <li><a href="#">Как купить</a></li>
          <li><a href="#">Преподавателям</a></li>
          <li><a href="#">Студентам</a></li>
          <li><a href="#">Учебным заведениям</a></li>
          <li><a href="#">Обучение преподавателей</a></li>
          <li><a href="#">Новости</a></li>
          <li><a href="#">Помощь</a></li>
        </ul>
      </div>
    </nav>

  </header>

</body>
</html>
