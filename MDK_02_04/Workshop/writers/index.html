<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Истории писателей</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=PT+Sans:wght@400;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <section class="writers-section">
    <h2 class="writers-section__title">Истории писателей</h2>

    <div class="writers-grid">

      <!-- ==============================
           КАРТОЧКА 1: Леонид Андреев
           Фото: положи файл images/andreev.jpg
           ============================== -->
      <article class="writer-card">
        <div class="writer-card__avatar writer-card__avatar--green">
          <img
            src="img/3.jpg"
            alt="Леонид Андреев"
            class="avatar-img"
          />
        </div>
        <div class="writer-card__body">
          <h3 class="writer-card__name">«Жизнь Человека» Лео...</h3>
          <p class="writer-card__desc">150 лет со дня рождения Леонида Андреева</p>
        </div>
        <span class="writer-card__badge writer-card__badge--green">Юбилей</span>
      </article>

      <!-- ==============================
           КАРТОЧКА 2: Валентин Катаев
           Фото: положи файл images/kataev.jpg
           ============================== -->
      <article class="writer-card writer-card--featured">
        <div class="writer-card__avatar writer-card__avatar--orange">
          <img
            src="img/1.jpg"
            alt="Валентин Катаев"
            class="avatar-img"
          />
        </div>
        <div class="writer-card__body">
          <h3 class="writer-card__name">Валентин Катаев</h3>
          <p class="writer-card__desc">125 лет со дня рождения писателя</p>
        </div>
        <span class="writer-card__badge writer-card__badge--orange">Юбилей</span>
      </article>

      <!-- ==============================
           КАРТОЧКА 3: Тургенев
           Фото: положи файл images/turgenev.jpg
           ============================== -->
      <article class="writer-card">
        <div class="writer-card__avatar writer-card__avatar--purple">
          <img
            src="img/2.jpg"
            alt="Иван Тургенев"
            class="avatar-img"
          />
        </div>
        <div class="writer-card__body">
          <h3 class="writer-card__name">Тургенев Иван Сергее...</h3>
          <p class="writer-card__desc">Наиболее известные произведения</p>
        </div>
        <span class="writer-card__badge writer-card__badge--purple">Классика</span>
      </article>

    </div>
  </section>

</body>
</html>
