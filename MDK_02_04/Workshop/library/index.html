<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Библиоклуб.ру</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ШАПКА -->
  <header class="header">
    <div class="header__left">
      <h1 class="logo">Библиоклуб.ру</h1>
      <p class="tagline">— Электронные книги для образования, бизнеса, досуга —</p>
    </div>
    <div class="header__right">
      <!-- ИЗОБРАЖЕНИЕ 1: смартфон с приложением -->
      <img src="phone.png" alt="Мобильное приложение" class="header__phone">
    </div>
  </header>

  <!-- СЕТКА КАРТОЧЕК -->
  <main class="grid">

    <div class="card">
      <!-- ИЗОБРАЖЕНИЕ 2: дети со школьными книгами -->
      <img src="biblioschool.jpg" alt="Библиошкола" class="card__img">
      <div class="card__label">БИБЛИОШКОЛА</div>
    </div>

    <div class="card">
      <!-- ИЗОБРАЖЕНИЕ 3: деревья / природа / арт -->
      <img src="art.jpg" alt="Арт-портал" class="card__img">
      <div class="card__label">АРТ-ПОРТАЛ</div>
    </div>

    <div class="card card--large card--right">
      <!-- ИЗОБРАЖЕНИЕ 4: иконка книги + ноутбук -->
      <img src="university.png" alt="Университетская библиотека онлайн" class="card__img">
      <div class="card__label">УНИВЕРСИТЕТСКАЯ<br>БИБЛИОТЕКА ОНЛАЙН</div>
    </div>

    <div class="card">
      <!-- ИЗОБРАЖЕНИЕ 5: логотип Директ-Академия -->
      <img src="direct.png" alt="Директ-Академия" class="card__img">
      <div class="card__label">ДИРЕКТ-АКАДЕМИЯ</div>
    </div>

    <div class="card">
      <!-- ИЗОБРАЖЕНИЕ 6: стопки книг / карандаши -->
      <img src="nonfiction.jpg" alt="Библиотека нон-фикшн" class="card__img">
      <div class="card__label">БИБЛИОТЕКА<br>НОН-ФИКШН</div>
    </div>

  </main>

</body>
</html>
