<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перезвоните мне</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="callback.css">
</head>
<body>

  <div class="wrapper">

    <div class="callback-box">
      <h2 class="title">Перезвоните мне</h2>
      <p class="desc">
        Наш менеджер перезвонит вам в течение 12 минут,<br>
        иначе мы предоставим скидку 10%
      </p>

      <form>
        <div class="input-wrap">
          <input type="text" placeholder="Введите ваш номер телефона" maxlength="25">
          <span class="input-hint">25 знаков доступно для ввода</span>
        </div>

        <div class="checkbox-wrap">
          <input type="checkbox" id="agree">
          <label for="agree">Согласен с обработкой данных *</label>
        </div>

        <button type="submit">Заказать звонок</button>
      </form>
    </div>

  </div>

</body>
</html>
