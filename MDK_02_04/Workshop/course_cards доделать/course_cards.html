<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Курсы</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="course_cards.css">
</head>
<body>

  <div class="catalog">

    <!-- Card 1 -->
    <div class="card">
      <div class="card-img">
        <img src="https://via.placeholder.com/280x160?text=Фото" alt="Курс 1">
        <div class="card-meta">
          <span class="meta-time">🕐 6</span>
          <span class="meta-lessons">🎬</span>
          <div class="card-price-bar">
            <span class="price">250 Р</span>
            <span class="cart-icon">🛒</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <p class="author">Приступа Е. Н.</p>
        <div class="card-tag">Новинка</div>
        <p class="card-title">Аттестация педагогических</p>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <div class="card-img">
        <img src="https://via.placeholder.com/280x160?text=Фото" alt="Курс 2">
        <div class="card-meta">
          <span class="meta-time">🕐 6</span>
          <span class="meta-lessons">🎬</span>
          <div class="card-price-bar">
            <span class="price">250 Р</span>
            <span class="cart-icon">🛒</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <p class="author">Васильева А. В.</p>
        <div class="card-tag">Новинка</div>
        <p class="card-title">ЕГЭ по русскому языку-2023:</p>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <div class="card-img">
        <img src="https://via.placeholder.com/280x160?text=Фото" alt="Курс 3">
        <div class="card-meta">
          <span class="meta-time">🕐 16</span>
          <span class="meta-lessons">🎬</span>
          <div class="card-price-bar">
            <span class="price">1190 Р</span>
            <span class="cart-icon">🛒</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <p class="author">Силина О. В.</p>
        <div class="card-tag">Новинка</div>
        <p class="card-title">Уверенное родительство:</p>
      </div>
    </div>

  </div>

</body>
</html>
