<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Библиотека им. Некрасова</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ШАПКА -->
  <header class="header">
    <div class="header__inner">

      <!-- Логотип библиотеки -->
      <div class="header__brand">
        <!-- ИЗОБРАЖЕНИЕ 1: логотип-пиктограмма (полосы) -->
        <img src="logo-icon.png" alt="Логотип" class="header__logo-img">
        <div class="header__brand-text">
          <span class="header__name">Библиотека</span>
          <span class="header__name">им. Н.А. Некрасова</span>
        </div>
      </div>

      <!-- Разделитель + герб Москвы -->
      <div class="header__dept">
        <!-- ИЗОБРАЖЕНИЕ 2: герб Москвы -->
        <img src="moscow-coat.png" alt="Герб Москвы" class="header__coat">
        <div class="header__dept-text">
          <span>Учреждение,</span>
          <span>подведомственное</span>
          <span>Департаменту культуры</span>
          <span>города Москвы</span>
        </div>
      </div>

      <!-- Ссылки справа -->
      <div class="header__links">
        <a href="#" class="header__nav-link">Посетителям</a>
      </div>

    </div>
  </header>

  <!-- НАВИГАЦИЯ -->
  <nav class="navbar">
    <ul class="navbar__list">
      <li><a href="#" class="navbar__link">Каталог</a></li>
      <li><a href="#" class="navbar__link">Афиша</a></li>
      <li><a href="#" class="navbar__link">Клубы</a></li>
      <li><a href="#" class="navbar__link">Онлайн-Лекторий</a></li>
      <li><a href="#" class="navbar__link">Проекты</a></li>
      <li><a href="#" class="navbar__link">Электронекрасовка</a></li>
    </ul>
  </nav>

  <!-- БАННЕР -->
  <section class="banner">
    <!-- ИЗОБРАЖЕНИЕ 3: фоновое фото рук / скульптура -->
    <img src="banner-bg.jpg" alt="Классика жанра" class="banner__bg">
    <div class="banner__content">
      <h2 class="banner__title">КЛАССИКА&nbsp;&nbsp;ЖАНРА</h2>
      <span class="banner__age">16+</span>
    </div>
  </section>

</body>
</html>
