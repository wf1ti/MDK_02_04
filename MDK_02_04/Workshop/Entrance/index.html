<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">
    <div class="login-box">
      <h2 class="login-box__title">Вход</h2>

      <div class="login-box__form">
        <input
          type="text"
          class="login-box__input"
          placeholder="Логин"
        >
        <input
          type="password"
          class="login-box__input"
          placeholder="Пароль"
        >
        <div class="login-box__footer">
          <button class="login-box__btn">Войти</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
